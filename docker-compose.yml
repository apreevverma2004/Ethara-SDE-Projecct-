version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: inventiq_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-inventory_db}
      POSTGRES_USER:     ${POSTGRES_USER:-inventiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventiq_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventiq} -d ${POSTGRES_DB:-inventory_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventiq_net

  # ── Backend (FastAPI) ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventiq_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-inventiq}:${POSTGRES_PASSWORD:-inventiq_secret}@db:5432/${POSTGRES_DB:-inventory_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inventiq_net

  # ── Frontend (React + nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    container_name: inventiq_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - inventiq_net

volumes:
  postgres_data:
    name: inventiq_postgres_data

networks:
  inventiq_net:
    name: inventiq_network
    driver: bridge
